# Agent Telemetry infra (Agent LCARS v2 program, Slice 1 — issue #2538 —
# plus Slice 2's runner-mode shipper + GCS transcript archive).
#
# A dedicated Firestore database + a write-only and a read-only service
# account for session telemetry (CLI + issue-agent runner sessions), isolated
# from the app's (default) Firestore database, plus a GCS bucket archiving
# full transcripts for issue-agent runs (the runner container is destroyed
# the moment the job ends, so this is the only durable copy of a
# crashed/timed-out run's transcript). See PRD #2112 and docs/firestore.md.
#
# This file is the source-of-truth inventory of what's provisioned. The
# provisioning script (tools/provision-agent-telemetry-gcp.sh) recreates it
# from scratch and is idempotent — re-run it if any of this needs to be
# rebuilt (e.g. in a new project, or after an accidental deletion).
project: 'supersprinklesracing'

# ChatGPT-managed Codex authentication for the independent issue worker.
# Seeded from a trusted workstation login and refreshed in place by Codex.
# The claude-agent-readonly runner identity has accessor + version-adder on
# this secret only (not project-wide Secret Manager access). Codex jobs are
# globally serialized so two runners never rotate the same refresh token.
secrets:
  codexAuth:
    name: 'CODEX_AUTH_JSON'
    consumers:
      - 'serviceAccount:claude-agent-readonly@supersprinklesracing.iam.gserviceaccount.com'
    roles:
      - 'roles/secretmanager.secretAccessor'
      - 'roles/secretmanager.secretVersionAdder'

firestore:
  database: 'agent-telemetry'
  location: 'us-central1'
  type: 'firestore-native'
  # Bounds the `sessions` collection, which otherwise grows by ~1 doc/session
  # forever (237 docs within the first weeks of Slice 1) — see issue #2708.
  # `expireAt` is a Firestore Timestamp field computed per-source in
  # libs/telemetry/src/lib/session-doc.ts (#3107 follow-up 2):
  #   - `source: 'cli'`:         lastActivityAt + CLI_SESSION_RETENTION_DAYS (30d)
  #   - `source: 'issue-agent'`: lastActivityAt + ISSUE_AGENT_SESSION_RETENTION_DAYS (365d)
  # 30d for `cli` docs comfortably outlives the console's 24h `activeSince`
  # read cutoff (#2694/#2701) without retaining a developer's own
  # host/cwd/branch detail indefinitely (privacy + noise). `issue-agent`
  # docs get 365d instead: they're the only index into Slice 2's durable GCS
  # transcript archive (`transcriptGcsUri`) — that archived transcript has
  # no TTL of its own, so once the Firestore doc pointing at it expires, the
  # archive becomes unbrowsable from the console. Since the field is
  # value-driven (Firestore just deletes whatever `expireAt` says, whatever
  # source computed it), this split needed no infra change here — only the
  # app-level computation changed; deletion is still performed by
  # Firestore's own service agent, so no extra IAM permission (e.g.
  # datastore.entities.delete) is needed on the writer role above.
  ttlPolicies:
    sessions:
      field: 'expireAt'
  # Composite indexes required by libs/telemetry/src/server/store.ts's
  # `listSessionDocs` once it composes the `activeSince` range filter
  # (lastActivityAt >=) with an equality filter (`source` and/or
  # `issueNumber`) — Firestore auto-indexes a single range filter or any
  # number of equality-only filters, but a range filter combined with an
  # equality filter on a *different* field always needs an explicit
  # composite index (confirmed empty via `gcloud firestore indexes composite
  # list --database=agent-telemetry` before these were created). Powers the
  # /sessions archive page's `source`/`issue` query params (PRD #2112 slice
  # 3/7/8). Provisioned 2026-07-19 via:
  #   gcloud firestore indexes composite create --database=agent-telemetry \
  #     --collection-group=sessions \
  #     --field-config=field-path=<f1>,order=ascending \
  #     --field-config=field-path=<f2>,order=ascending \
  #     [--field-config=field-path=<f3>,order=ascending] \
  #     --project=supersprinklesracing
  indexes:
    sessions:
      - fields: ['source', 'lastActivityAt']
      - fields: ['issueNumber', 'lastActivityAt']
      - fields: ['source', 'issueNumber', 'lastActivityAt']

# Firestore has no built-in "write-only" or database-scoped role, so both
# roles are custom, and every grant below is IAM-condition-scoped to this
# one database (resource.type == "firestore.googleapis.com/Database" &&
# resource.name == "projects/<project>/databases/agent-telemetry"). Do NOT
# grant either role unconditionally — that defeats the isolation from the
# app's (default) database.
customRoles:
  agentTelemetryWriter:
    title: 'Agent Telemetry Writer'
    description: 'Write-only access (create/update, no read/list) to the dedicated agent-telemetry Firestore database.'
    includedPermissions:
      - datastore.databases.get
      - datastore.entities.create
      - datastore.entities.update
  agentTelemetryReader:
    title: 'Agent Telemetry Reader'
    description: 'Read-only access (get/list, no write) to the dedicated agent-telemetry Firestore database.'
    includedPermissions:
      - datastore.databases.get
      - datastore.entities.get
      - datastore.entities.list

serviceAccounts:
  # Runner-facing (Slice 2 shipper) and host-watcher-facing (Slice 1, issue
  # #2540) writer. Never grant this SA to the shared App Hosting compute
  # identity or any principal that already has a broader Firestore role —
  # roles/datastore.user on firebase-app-hosting-compute already covers
  # every database in this project unconditionally, so layering a scoped
  # role on top of it grants nothing (this bit us during provisioning: see
  # #2538).
  writer:
    email: 'agent-telemetry-writer@supersprinklesracing.iam.gserviceaccount.com'
    role: 'agentTelemetryWriter'
    grants:
      # The `claude-agent-pool/providers/claude-agent-github` WIF provider
      # (projects/972941236852/locations/global/workloadIdentityPools/claude-agent-pool/providers/claude-agent-github)
      # backs this principalSet. Unlike the pool/roles above, the provider
      # itself is NOT created by tools/provision-agent-telemetry-gcp.sh —
      # it's managed by live gcloud only. Its current attribute condition
      # (widened again 2026-07-19, live gcloud change, orchestrating session
      # c566c8de — see #3123 phase 2, following the claude.yml/deploy.yml
      # widening from #3113 below):
      #   assertion.repository=='supersprinklesracing/members' &&
      #   (assertion.job_workflow_ref.startsWith('supersprinklesracing/members/.github/workflows/claude.yml') ||
      #    assertion.job_workflow_ref.startsWith('supersprinklesracing/members/.github/workflows/codex.yml') ||
      #    assertion.job_workflow_ref.startsWith('supersprinklesracing/members/.github/workflows/deploy.yml') ||
      #    assertion.job_workflow_ref.startsWith('supersprinklesracing/members/.github/workflows/opencode.yml'))
      # It trusts exactly four job refs:
      #   - claude.yml: the runner-mode shipper (this writer SA, "Ship
      #     session telemetry") plus the claude-agent-readonly SA's
      #     read-only observability auth ("Authenticate to GCP" above).
      #   - deploy.yml: the `publish-ride-along` job impersonates this same
      #     writer SA to upload the agent-telemetry-watcher ride-along
      #     bundle (#3111). Originally trusted claude.yml job refs only,
      #     which made deploy.yml's first ride-along publish fail with
      #     "credential rejected by the attribute condition" (run
      #     29713808422, fixed by rerunning after the live widening).
      #   - opencode.yml: archive-first session shipping (#3123 phase 2) —
      #     its own "Authenticate telemetry writer" step mints a token for
      #     this SA to upload OpenCode's raw local session storage (no
      #     `TranscriptAdapter` for it yet) and upsert a STUB session doc
      #     via `agent-telemetry upsert-stub`, pointing at the archive. See
      #     the storage section below for the `runs/<run-id>/opencode/`
      #     object layout this produces.
      #   - codex.yml: archive-first Codex rollout shipping and readonly GCP
      #     access for the independent Codex issue worker.
      - principal: 'principalSet://iam.googleapis.com/projects/972941236852/locations/global/workloadIdentityPools/claude-agent-pool/attribute.repository/supersprinklesracing/members'
        role: 'roles/iam.workloadIdentityUser'
        reason: 'claude.yml and codex.yml mint access tokens for their session shippers; deploy.yml publishes the ride-along bundle; opencode.yml archives raw session storage'
      - principal: 'user:jlapenna@gmail.com'
        role: 'roles/iam.serviceAccountTokenCreator'
        reason: 'manual ops / verification'
    # Host watchers (issue #2540) authenticate with this key, since they
    # run outside any GCP compute identity. Fetch via:
    #   gcloud secrets versions access latest \
    #     --project=supersprinklesracing \
    #     --secret=AGENT_TELEMETRY_WRITER_KEY_JSON
    keySecret: 'AGENT_TELEMETRY_WRITER_KEY_JSON'

  # Console-facing reader. A dedicated SA, deliberately NOT the shared
  # firebase-app-hosting-compute identity (see the writer's comment above
  # for why) — the console impersonates this SA at runtime instead.
  reader:
    email: 'agent-telemetry-reader@supersprinklesracing.iam.gserviceaccount.com'
    role: 'agentTelemetryReader'
    grants:
      - principal: 'serviceAccount:firebase-app-hosting-compute@supersprinklesracing.iam.gserviceaccount.com'
        role: 'roles/iam.serviceAccountTokenCreator'
        reason: 'agent-console frontend (issue #2541) impersonates this SA to read session docs'
      - principal: 'user:jlapenna@gmail.com'
        role: 'roles/iam.serviceAccountTokenCreator'
        reason: 'manual ops / verification'

# Slice 2's GCS transcript archive. The runner container claude.yml/
# codex.yml/opencode.yml run on is destroyed the instant the job ends, so this bucket
# is the only durable copy of a run's full session data (particularly
# valuable for a crashed/timed-out/turn-budget-exhausted run, where it's
# otherwise the only record of what was attempted). Shipping is best-effort
# on both pipelines (`if: always()` + `continue-on-error: true` on the
# relevant step) — a failed upload must never fail the run.
storage:
  transcriptsBucket:
    name: 'supersprinklesracing-agent-session-transcripts'
    location: 'us-central1'
    uniformBucketLevelAccess: true
    publicAccessPrevention: true
    # Two distinct layouts share this bucket, one per pipeline:
    #   - claude.yml: runs/<github-run-id>/<transcript-filename>.jsonl, one
    #     object per transcript file found under
    #     $HOME/.claude/projects/*/*.jsonl at the end of the run (normally
    #     exactly one; the container is fresh per run, so everything found
    #     there belongs to this run's session(s)). $HOME tracks whichever
    #     user the job runs as — the ARC scale-set runners (#2974) run as
    #     `runner`, not root.
    #   - opencode.yml (#3123 phase 2, archive-first shipping): runs/
    #     <github-run-id>/opencode/<relative-path>, one object per regular
    #     file found under OpenCode's local session data dir ($HOME/.local/
    #     share/opencode or $XDG_DATA_HOME/opencode, whichever exists) —
    #     typically its SQLite `opencode.db` plus any sibling files, minus
    #     its own `log/` subtree (debug output, not session data) and
    #     anything over 100MB. There is no `TranscriptAdapter` for this
    #     format yet (see libs/telemetry/src/lib/transcript-adapter.ts),
    #     so unlike the claude.yml layout this is raw, unparsed storage, not
    #     a reduced transcript — the matching Firestore session doc's
    #     `transcriptGcsUri` points at the `runs/<run-id>/opencode/` prefix
    #     itself (a directory, not one object) and the console renders a
    #     "not yet renderable" note instead of a transcript timeline for it
    #     (see session-detail.ts / app/sessions/[id]/page.tsx).
    #   - codex.yml: runs/<github-run-id>/codex/YYYY/MM/DD/<rollout>.jsonl,
    #     preserving Codex's date-partitioned session layout.
    objectLayout: 'runs/<github-run-id>/<transcript-filename>.jsonl (claude.yml) | runs/<github-run-id>/codex/<relative-path> (codex.yml) | runs/<github-run-id>/opencode/<relative-path> (opencode.yml)'
    grants:
      - principal: 'serviceAccount:agent-telemetry-writer@supersprinklesracing.iam.gserviceaccount.com'
        role: 'roles/storage.objectCreator'
        reason: "Agent workflows upload Claude, Codex, and OpenCode session archives via the GCS JSON API using this SA's WIF-minted access token"
      - principal: 'serviceAccount:firebase-app-hosting-compute@supersprinklesracing.iam.gserviceaccount.com'
        role: 'roles/storage.objectViewer'
        reason: 'agent-console reads archived transcripts back out for the session detail page (follow-up PR, PRD #2112) — granted directly since the console reads with its own runtime identity, not an impersonation call like the Firestore reader path above'
